service: mirror-collective-python-api
frameworkVersion: '>=3.38.0 <4.0.0'

provider:
  name: aws
  # NOTE: python3.12 + SnapStart was reverted after a failed prod deploy — the
  # installed Serverless Framework (3.40) rejects python3.12 in its schema, and
  # SnapStart was refused because the api function uses 1024MB ephemeral storage
  # (SnapStart requires <=512MB). Re-attempt only after (1) upgrading Serverless
  # Framework to a version supporting python3.12, and (2) reducing the api
  # function's ephemeral storage to 512MB (verify nothing relies on >512MB /tmp).
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, env:STAGE, 'staging'}
  memorySize: 1024
  timeout: 30
  environment:
    ALLOWED_ORIGINS: ${env:ALLOWED_ORIGINS, 'http://localhost:3000'}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, ''}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, ''}
    COGNITO_CLIENT_SECRET: ${env:COGNITO_CLIENT_SECRET, ''}
    # Rate limiting is now enforced at the API Gateway layer
    # (resources.extensions.HttpApiStage.DefaultRouteSettings below).
    # The previous RATE_LIMIT_* env vars only configured an in-memory
    # per-container limiter which provided no real protection.
    OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
    # SNS/SES Notifications
    SNS_TOPIC_ARN: ${env:SNS_TOPIC_ARN, ''}
    # APNs/FCM platform-application ARNs, resolved per-stage from SSM at deploy
    # time (Serverless reads ${ssm:...} with the deployer's creds and bakes the
    # value into the Lambda env — no runtime SSM access needed). Created once
    # per environment by scripts/setup_apns_platform_app.py, which also maps the
    # stage to the right APNs environment (staging → APNS_SANDBOX, prod → APNS)
    # so device tokens (dev build = sandbox, TestFlight = production) match.
    # Empty-string fallback keeps deploys working before the param exists.
    SNS_IOS_APP_ARN: ${ssm:/mirror-collective/${self:provider.stage}/sns/ios-app-arn, ''}
    SNS_ANDROID_APP_ARN: ${ssm:/mirror-collective/${self:provider.stage}/sns/android-app-arn, ''}
    SES_SENDER_EMAIL: ${env:SES_SENDER_EMAIL, 'app@themirrorcollective.com'}
    APP_NAME: "Mirror Collective"
    APP_URL: ${env:APP_URL, 'https://mirrorcollective.com'}
    # Public brand-asset bucket for the rich echo-share emails. Email clients
    # (Gmail, etc.) fetch the <img> sources server-side with no auth, so this
    # bucket is public-read — unlike the presigned-only vault bucket. The MJML
    # templates AND the share viewer reference images as
    # ${EMAIL_ASSET_BASE_URL}/<name>.png.
    #
    # NOTE: the live brand assets (logo, divider-star, icon-lock, the email
    # starfield bg, etc.) live in the SHARED bucket
    # `mirror-collective-email-assets-production-v2` — note the `-v2` suffix,
    # which the per-stage resource name below does NOT carry. The previous
    # default (`...-${stage}`) resolved to a non-existent `...-production`
    # bucket, so the share viewer's logo 404'd. Default all stages at the real
    # shared bucket (matches "point all stages at one shared bucket"); override
    # EMAIL_ASSET_BASE_URL via env for a stage-specific bucket.
    EMAIL_ASSETS_BUCKET: mirror-collective-email-assets-${self:provider.stage}
    EMAIL_ASSET_BASE_URL: ${env:EMAIL_ASSET_BASE_URL, 'https://mirror-collective-email-assets-production-v2.s3.${self:provider.region}.amazonaws.com'}
    # Public tokenized echo viewer (email-recipient attachment playback).
    # SHARE_TOKEN_SECRET signs the share JWT — REQUIRED in every env (no default;
    # set per stage). SHARE_BASE_URL is the API's own public origin (where the
    # /share/* routes live) — the API Gateway URL or a CloudFront distro that
    # forwards /share/* to the API with query strings + no caching.
    SHARE_TOKEN_SECRET: ${env:SHARE_TOKEN_SECRET, ''}
    SHARE_BASE_URL: ${env:SHARE_BASE_URL, 'https://ct3onxgeol.execute-api.us-east-1.amazonaws.com'}
    DYNAMODB_USERS_TABLE: ${self:service}-users-${self:provider.stage}
    DYNAMODB_ACTIVITY_TABLE: ${self:service}-activity-${self:provider.stage}
    DYNAMODB_CONVERSATIONS_TABLE: ${self:service}-conversations-${self:provider.stage}-v2
    DYNAMODB_MESSAGES_TABLE: ${self:service}-messages-${self:provider.stage}
    # MirrorGPT Tables
    DYNAMODB_ARCHETYPE_PROFILES_TABLE: ${self:service}-archetype-profiles-${self:provider.stage}
    DYNAMODB_MIRROR_MOMENTS_TABLE: ${self:service}-mirror-moments-${self:provider.stage}
    DYNAMODB_PATTERN_LOOPS_TABLE: ${self:service}-pattern-loops-${self:provider.stage}
    DYNAMODB_QUIZ_RESULTS_TABLE: ${self:service}-quiz-results-${self:provider.stage}
    DYNAMODB_QUIZ_QUESTIONS_TABLE: ${self:service}-quiz-questions-${self:provider.stage}
    DYNAMODB_DEVICE_TOKENS_TABLE: ${self:service}-device-tokens-${self:provider.stage}
    DYNAMODB_SOUL_PINGS_TABLE: ${self:service}-soul-pings-${self:provider.stage}
    # Echo Vault Tables
    DYNAMODB_ECHOES_TABLE: ${self:service}-echoes-${self:provider.stage}
    DYNAMODB_RECIPIENTS_TABLE: ${self:service}-recipients-${self:provider.stage}
    DYNAMODB_GUARDIANS_TABLE: ${self:service}-guardians-${self:provider.stage}
    # Stores cached responses keyed by client-supplied Idempotency-Key.
    # Read on every write that supports idempotency; written with a 24 h
    # TTL via the table's expires_at attribute.
    DYNAMODB_IDEMPOTENCY_TABLE: ${self:service}-idempotency-${self:provider.stage}
    ECHO_MEDIA_BUCKET: mirror-collective-vault-storage-${self:provider.stage}
    # Route S3 PUTs through the s3-accelerate endpoint. Requires the bucket's
    # AccelerateConfiguration to be Enabled (see resources section). See
    # EchoService._get_s3_kwargs for the client-side switch.
    S3_ACCELERATE_ENABLED: "true"
    # Video transcoding (MediaConvert) — web-playable MP4 renditions so videos
    # play in any browser from the email-share viewer. Role is created in
    # resources; output lands under TRANSCODE_OUTPUT_PREFIX in the vault bucket.
    MEDIACONVERT_ROLE_ARN:
      Fn::GetAtt: [ MediaConvertRole, Arn ]
    TRANSCODE_OUTPUT_PREFIX: "transcoded/"
    # Subscription/IAP Tables
    DYNAMODB_SUBSCRIPTIONS_TABLE: ${self:service}-subscriptions-${self:provider.stage}
    DYNAMODB_SUBSCRIPTION_EVENTS_TABLE: ${self:service}-subscription-events-${self:provider.stage}
    # Reflection Room V1 Tables
    DYNAMODB_REFLECTION_SESSIONS_TABLE: ${self:service}-reflection-sessions-${self:provider.stage}
    DYNAMODB_ECHO_LOOP_STATE_TABLE: ${self:service}-echo-loop-state-${self:provider.stage}
    DYNAMODB_PRACTICE_COMPLETIONS_TABLE: ${self:service}-practice-completions-${self:provider.stage}
    DYNAMODB_USER_PERSONALIZATION_TABLE: ${self:service}-user-personalization-${self:provider.stage}
    # MirrorGPT Memory — Life Anchors (Phase 2)
    DYNAMODB_LIFE_ANCHORS_TABLE: ${self:service}-life-anchors-${self:provider.stage}
    # Feature flags for the MirrorGPT Memory feature. Both ENABLED by default
    # (all stages incl. prod); set the env var to "false" for a stage to
    # kill-switch without a code change.
    # LIFE_ANCHORS gates in-chat detection, the confirm flow, and preflight
    # injection of anchors. PREFLIGHT_PATTERNS gates the Echo Map patterns +
    # recent-summary preflight (Phase 1).
    MIRRORGPT_LIFE_ANCHORS: ${env:MIRRORGPT_LIFE_ANCHORS, 'true'}
    MIRRORGPT_PREFLIGHT_PATTERNS: ${env:MIRRORGPT_PREFLIGHT_PATTERNS, 'true'}
    # Reflection Room V1 — config + tz
    REFLECTION_DEFAULT_USER_TZ: ${env:REFLECTION_DEFAULT_USER_TZ, 'America/New_York'}
    # Apple/Google IAP credentials
    APPLE_SHARED_SECRET: ${env:APPLE_SHARED_SECRET, ''}
    GOOGLE_SERVICE_ACCOUNT_KEY: ${env:GOOGLE_SERVICE_ACCOUNT_KEY, ''}
    GOOGLE_PACKAGE_NAME: ${env:GOOGLE_PACKAGE_NAME, 'com.mirrorcollective.app'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            # BatchGetItem is used by EchoService to collapse per-row
            # recipient enrichment lookups into a single round-trip
            # (see services/echo_service.py:_batch_get_recipients).
            # Without this grant the lambda hits AccessDenied on every
            # GET /api/echoes and returns 500.
            - dynamodb:BatchGetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:DescribeTable
          Resource:
            - Fn::GetAtt: [ UsersTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ UsersTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ ActivityTable, Arn ]
            - Fn::GetAtt: [ ConversationsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ ConversationsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ MessagesTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ MessagesTable, Arn ]
                - 'index/*'
            # MirrorGPT Tables
            - Fn::GetAtt: [ ArchetypeProfilesTable, Arn ]
            - Fn::GetAtt: [ MirrorMomentsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ MirrorMomentsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ PatternLoopsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ PatternLoopsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ QuizResultsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ QuizResultsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ QuizQuestionsTable, Arn ]
            - Fn::GetAtt: [ DeviceTokensTable, Arn ]
            - Fn::GetAtt: [ SoulPingsTable, Arn ]
            # Echo Vault Tables
            - Fn::GetAtt: [ EchoVaultEchoesTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ EchoVaultEchoesTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ EchoVaultRecipientsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ EchoVaultRecipientsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ EchoVaultGuardiansTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ EchoVaultGuardiansTable, Arn ]
                - 'index/*'
            # Idempotency cache — single-PK, no GSIs.
            - Fn::GetAtt: [ IdempotencyTable, Arn ]
            # Subscription Tables
            - Fn::GetAtt: [ SubscriptionsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ SubscriptionsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ SubscriptionEventsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ SubscriptionEventsTable, Arn ]
                - 'index/*'
            # Reflection Room V1 Tables
            - Fn::GetAtt: [ ReflectionSessionsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ ReflectionSessionsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ EchoLoopStateTable, Arn ]
            - Fn::GetAtt: [ PracticeCompletionsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ PracticeCompletionsTable, Arn ]
                - 'index/*'
            - Fn::GetAtt: [ UserPersonalizationTable, Arn ]
            # MirrorGPT Memory — Life Anchors (Phase 2)
            - Fn::GetAtt: [ LifeAnchorsTable, Arn ]
            - Fn::Join:
              - '/'
              - - Fn::GetAtt: [ LifeAnchorsTable, Arn ]
                - 'index/*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:PutObjectTagging      # for Tagging param in presigned PUT
            - s3:GetObject             # also covers HeadObject in finalize
            - s3:ListBucket
            # Multipart upload routes — without these the Lambda receives
            # AccessDenied on every multipart call (initiate / part-urls /
            # complete / abort). The signer-role needs these even though
            # the actual UploadPart calls happen from the client against
            # presigned URLs, because the SigV4 signature is computed
            # using the role's permissions.
            - s3:CreateMultipartUpload
            - s3:UploadPart
            - s3:CompleteMultipartUpload
            - s3:AbortMultipartUpload
            - s3:ListMultipartUploadParts
          Resource:
            - arn:aws:s3:::${self:provider.environment.ECHO_MEDIA_BUCKET}
            - arn:aws:s3:::${self:provider.environment.ECHO_MEDIA_BUCKET}/*
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "*"
        # Video transcoding: submit/inspect MediaConvert jobs + discover the
        # account/region endpoint, and pass the MediaConvert service role.
        - Effect: Allow
          Action:
            - mediaconvert:CreateJob
            - mediaconvert:GetJob
            - mediaconvert:DescribeEndpoints
          Resource: "*"
        - Effect: Allow
          Action:
            - iam:PassRole
          Resource:
            - Fn::GetAtt: [ MediaConvertRole, Arn ]
        - Effect: Allow
          Action:
            - sns:Publish
            - sns:Subscribe
            - sns:CreatePlatformEndpoint
            - sns:DeleteEndpoint
            - sns:GetEndpointAttributes
            - sns:SetEndpointAttributes
          Resource: "*"
        - Effect: Allow
          Action:
            - cognito-idp:GetUser
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminInitiateAuth
            - cognito-idp:AdminDeleteUser
            - cognito-idp:DescribeUserPool
            - cognito-idp:DescribeUserPoolClient
            - cognito-idp:SignUp
            - cognito-idp:ConfirmSignUp
            - cognito-idp:ResendConfirmationCode
            - cognito-idp:ForgotPassword
            - cognito-idp:ConfirmForgotPassword
            - cognito-idp:InitiateAuth
            - cognito-idp:DeleteUser
            - cognito-idp:GlobalSignOut
          Resource:
            - arn:aws:cognito-idp:${self:provider.region}:*:userpool/*
  logs:
    http: true
  httpApi:
    # JWT authorizer wired at gateway boundary. The backend (core/security.py)
    # ALSO verifies the JWT signature via JWKS as defense-in-depth — both layers
    # must pass for a request to reach a protected route. Cognito access tokens
    # carry client_id (not aud); AWS HTTP API authorizer accepts either claim
    # when validating against the `audience` setting.
    authorizers:
      cognitoJwtAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${self:provider.region}.amazonaws.com/${env:COGNITO_USER_POOL_ID}
        audience:
          - ${env:COGNITO_CLIENT_ID}
    # NOTE: Stage-level throttling (DefaultRouteSettings) is applied via the
    # `resources.extensions.HttpApiStage` block at the bottom of this file.
    # API Gateway throttling replaces the previous in-memory per-container
    # rate limiter (deleted in this PR) — its counter is centralized and
    # actually enforces a global request rate across all Lambda containers.

functions:
  api:
    handler: src/app/handler.handler
    # Lambda CPU scales with memory: ~1024MB ≈ 0.58 vCPU, 1769MB = 1 full vCPU.
    # The API's cold-start init (~5.6s) and request work are CPU-bound (boto3 /
    # openai imports, service construction), so 1769 roughly doubles CPU vs the
    # 1024 default — faster cold starts and handlers. Memory headroom is large
    # (avg ~238MB used), so this buys CPU, not RAM. Shorter duration often makes
    # the per-ms cost increase close to net-neutral. Tune up/down as needed.
    memorySize: 1769
    # Provisioned concurrency keeps 1 initialized instance warm so requests skip
    # the ~5.6s cold-start init (the dominant p95 driver across all endpoints).
    # Serverless publishes a version + alias and points the httpApi integration
    # at the alias, so API Gateway invokes the warm pool. Unlike SnapStart, PC
    # has no runtime (3.12) or ephemeral-storage (<=512MB) constraints, so it
    # works on the current config as-is.
    #
    # Cost: 1 warm instance at 1769MB ≈ $19/mo. At our low, mostly-serial
    # traffic, 1 covers the common case; a 2nd concurrent request can still cold
    # start. Raise this, or add Application Auto Scaling scheduled actions to
    # scale to 0 off-hours, if you want to trim cost.
    provisionedConcurrency: 1
    events:
      # ---- Public routes (no authorizer) ----
      # Health checks (monitors / load balancers).
      - httpApi:
          method: GET
          path: /health
      - httpApi:
          method: GET
          path: /health/detailed
      - httpApi:
          method: GET
          path: /api/health
      - httpApi:
          method: GET
          path: /api/mirrorgpt/health
      # Auth endpoints — must be reachable before the user has a token.
      - httpApi:
          method: POST
          path: /api/auth/register
      - httpApi:
          method: POST
          path: /api/auth/login
      - httpApi:
          method: POST
          path: /api/auth/forgot-password
      - httpApi:
          method: POST
          path: /api/auth/reset-password
      - httpApi:
          method: POST
          path: /api/auth/refresh
      - httpApi:
          method: POST
          path: /api/auth/confirm-email
      - httpApi:
          method: POST
          path: /api/auth/resend-verification-code
      # IAP webhooks — Apple/Google sign the payload; signature is verified
      # by receipt_validator. Cognito JWT does not apply.
      - httpApi:
          method: POST
          path: /verify-purchase
      # Archetype Discovery Quiz — runs BEFORE signup as part of the
      # onboarding flow, so the client has no Cognito JWT yet. The
      # submission carries an optional ``anonymousId`` so the backend can
      # link results to the user once they confirm their email. See
      # ``src/services/api/quiz.ts`` on the mobile client — both endpoints
      # are explicitly ``requiresAuth: false``.
      - httpApi:
          method: GET
          path: /api/mirrorgpt/quiz/questions
      - httpApi:
          method: POST
          path: /api/mirrorgpt/quiz/submit
      # Public tokenized echo share viewer + attachment redirect. Email
      # recipients have no Cognito JWT — access is authorized by the share
      # token in the ?t= query param (core/share_token.verify_share_token),
      # so these must NOT sit behind cognitoJwtAuthorizer.
      - httpApi:
          method: GET
          path: /share/echo/{echo_id}
      - httpApi:
          method: GET
          path: /share/echo/{echo_id}/attachment/{attachment_id}
      # ---- Authenticated catch-all ----
      # Every other route requires a valid Cognito JWT.
      - httpApi:
          method: '*'
          path: '*'
          authorizer:
            name: cognitoJwtAuthorizer

  # Scheduled job for trial expiration checks
  trialExpirationCheck:
    handler: src/app/jobs/trial_expiration_job.lambda_handler
    description: Daily check for trial expirations and notifications
    timeout: 300
    memorySize: 256
    events:
      - schedule:
          rate: cron(0 12 * * ? *)  # Run daily at 12:00 UTC
          description: Check trial expirations and send notifications

  # Scheduled job: auto-release DRAFT echoes whose release_date has passed
  echoReleaseScheduler:
    handler: src/app/jobs/echo_release_job.lambda_handler
    description: Hourly scan for DRAFT echoes due for auto-release
    timeout: 300
    memorySize: 256
    events:
      - schedule:
          rate: cron(0 * * * ? *)  # Run hourly at minute 0 UTC
          description: Auto-release scheduled echoes

  # Scheduled job: daily Soul Ping dispatch (one proactive ping per user max,
  # generated from recent mirror-chat history + summary). The service enforces
  # per-user category config, and skips/re-engages based on whether the last
  # ping was seen (avoids duplicate nudges on the same conversation).
  soulPingDispatch:
    handler: src/app/jobs/soul_ping_job.lambda_handler
    description: Daily per-user Soul Ping generation + delivery (9 PM EST)
    timeout: 600
    memorySize: 512
    events:
      - schedule:
          # 02:00 UTC = 9 PM EST (fixed offset; lands at 10 PM Eastern during
          # EDT/summer since EventBridge cron has no DST). One send per day.
          rate: cron(0 2 * * ? *)
          description: Generate and send Soul Pings (daily, 9 PM EST)

  # Writes the web-playable MP4 url back onto an attachment when a MediaConvert
  # transcode finishes. Triggered by EventBridge on job-state COMPLETE.
  transcodeComplete:
    handler: src/app/jobs/transcode_complete_job.lambda_handler
    description: Record MediaConvert MP4 rendition on the echo attachment
    timeout: 60
    memorySize: 256
    events:
      - eventBridge:
          pattern:
            source:
              - aws.mediaconvert
            detail-type:
              - MediaConvert Job State Change
            detail:
              status:
                - COMPLETE

resources:
  # Stage-level throttling for the HTTP API. Serverless Framework creates the
  # default stage as logical resource `HttpApiStage` (CloudFormation type
  # AWS::ApiGatewayV2::Stage). We override its DefaultRouteSettings so that
  # API Gateway enforces a centralized request rate across ALL Lambda
  # containers — replacing the deleted in-memory limiter which only counted
  # requests within a single container.
  #
  # ThrottlingRateLimit:  steady-state requests per second (token refill rate)
  # ThrottlingBurstLimit: peak burst capacity (token bucket size)
  #
  # Numbers chosen to allow normal usage but cap abuse. Per-route burst caps
  # (e.g., stricter on /api/mirrorgpt/chat) can be added in a follow-up PR
  # via the `routeSettings` map on this same Stage resource.
  #
  # Docs: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-resource-apigatewayv2-stage.html#cfn-apigatewayv2-stage-defaultroutesettings
  extensions:
    HttpApiStage:
      Properties:
        DefaultRouteSettings:
          ThrottlingBurstLimit: 5000
          ThrottlingRateLimit: 1000
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-users-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

    ActivityTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-activity-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: activity_date
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: activity_date
            KeyType: RANGE

    # Note: ConversationsTable renamed to -v2 to resolve CloudFormation replacement issue
    # This allows deployment to proceed without requiring manual table deletion
    ConversationsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-conversations-${self:provider.stage}-v2
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: conversation_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: last_message_at
            AttributeType: S
        KeySchema:
          - AttributeName: conversation_id
            KeyType: HASH
          - AttributeName: user_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: user-conversations-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: last_message_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    MessagesTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-messages-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: conversation_id
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: conversation_id
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE

    # MirrorGPT Tables
    ArchetypeProfilesTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-archetype-profiles-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

    MirrorMomentsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-mirror-moments-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: moment_id
            AttributeType: S
          - AttributeName: triggered_at
            AttributeType: S
          - AttributeName: moment_type
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: moment_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: type-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: moment_type
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: time-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: triggered_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    PatternLoopsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-pattern-loops-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: loop_id
            AttributeType: S
          - AttributeName: last_seen
            AttributeType: S
          - AttributeName: trend
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: loop_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: trend-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: trend
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: activity-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: last_seen
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    QuizResultsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-quiz-results-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: quiz_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: completed_at
            AttributeType: S
        KeySchema:
          - AttributeName: quiz_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-quiz-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: completed_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    QuizQuestionsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-quiz-questions-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: N
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    DeviceTokensTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-device-tokens-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: device_token
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: device_token
            KeyType: RANGE

    # Soul Pings: one row per sent ping (PK user_id, SK sent_at desc) — source
    # of truth for the one-per-hour throttle and a future in-app feed.
    SoulPingsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-soul-pings-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: sent_at
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: sent_at
            KeyType: RANGE

    # Echo Vault Tables
    EchoVaultEchoesTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_ECHOES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: echo_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: category
            AttributeType: S
          - AttributeName: recipient_id
            AttributeType: S
        KeySchema:
          - AttributeName: echo_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-echoes-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: status
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: category-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: category
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: recipient-echoes-index
            KeySchema:
              - AttributeName: recipient_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

    EchoVaultRecipientsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_RECIPIENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: recipient_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
          - AttributeName: recipient_user_id
            AttributeType: S
        KeySchema:
          - AttributeName: recipient_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-recipients-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: recipient-user-id-index
            KeySchema:
              - AttributeName: recipient_user_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

    EchoVaultGuardiansTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_GUARDIANS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: guardian_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: guardian_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-guardians-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    IdempotencyTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_IDEMPOTENCY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          # Composite PK: "<user_id>|<route>|<client_key>" keeps the
          # per-user / per-route namespacing flat for a single HASH lookup.
          - AttributeName: key_namespace
            AttributeType: S
        KeySchema:
          - AttributeName: key_namespace
            KeyType: HASH
        # TTL on epoch-seconds attribute — DynamoDB deletes within 48h of
        # the timestamp passing. Set to created_at + 24h by the writer.
        TimeToLiveSpecification:
          AttributeName: expires_at
          Enabled: true

    EchoVaultMediaBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.ECHO_MEDIA_BUCKET}
        # Transfer Acceleration routes uploads through the nearest
        # CloudFront edge. ~30-400% faster PUTs for users far from
        # us-east-1; safe for users near it too (falls back transparently).
        # The aioboto3 client picks this up when S3_ACCELERATE_ENABLED=true
        # — see EchoService._get_s3_kwargs.
        AccelerateConfiguration:
          AccelerationStatus: Enabled
        # User-private echo media. All reads go through presigned URLs
        # generated by EchoService._sign_media_url and _sign_profile_url
        # (and future-Tier-3 CloudFront-signed URLs). Block all public
        # access: nothing in this codebase sets `ACL: public-read`, so
        # locking down here is a no-op for the happy path and closes the
        # door on accidental exposure via a stray SDK call.
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        # Reap abandoned multipart uploads. The client SHOULD call
        # POST /echoes/{id}/multipart/abort when the user cancels, but
        # we can't trust that — a backgrounded app may never get the
        # chance. Without this rule, partial uploads sit in S3
        # consuming storage until manually cleaned up.
        # 7 days is comfortably longer than any real upload window
        # (largest current allowed file size + worst-case cellular
        # ≪ 24 h) but short enough to keep the orphan storage bill
        # bounded.
        LifecycleConfiguration:
          Rules:
            - Id: AbortIncompleteMultipartUpload
              Status: Enabled
              AbortIncompleteMultipartUpload:
                DaysAfterInitiation: 7
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
              AllowedOrigins: ['*']
              MaxAge: 3000

    # Public brand-asset bucket for the rich echo-share emails. Email clients
    # fetch <img> sources server-side with no auth, so objects must be
    # public-read (the opposite of the vault bucket). After first deploy, upload
    # the 8 brand images to the bucket root (see emails/README.md):
    #   logo-mirror-collective.png  divider-star.png      waveform-gold.png
    #   icon-play-gold.png          icon-download.png     icon-lock.png
    #   hero-default.jpg            attachment-thumb.png
    EmailAssetsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.EMAIL_ASSETS_BUCKET}
        # ACLs disabled; public access granted via the bucket policy below.
        OwnershipControls:
          Rules:
            - ObjectOwnership: BucketOwnerEnforced
        # Allow a public read policy (the three other guards stay on).
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, HEAD]
              AllowedOrigins: ['*']
              MaxAge: 3000

    # Public-read policy: anyone can GET objects (brand images only). No list,
    # no write — those require IAM/owner credentials.
    EmailAssetsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: ${self:provider.environment.EMAIL_ASSETS_BUCKET}
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: 'arn:aws:s3:::${self:provider.environment.EMAIL_ASSETS_BUCKET}/*'

    # IAM role AWS Elemental MediaConvert assumes to read source videos and
    # write transcoded MP4 renditions back into the vault bucket. Referenced by
    # MEDIACONVERT_ROLE_ARN and passed on every CreateJob call.
    MediaConvertRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:service}-mediaconvert-${self:provider.stage}
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: mediaconvert.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: mediaconvert-vault-s3
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:PutObject
                  Resource:
                    - 'arn:aws:s3:::${self:provider.environment.ECHO_MEDIA_BUCKET}/*'

    # Subscription/IAP Tables
    SubscriptionsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_SUBSCRIPTIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: subscription_id
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: subscription_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: subscription-id-index
            KeySchema:
              - AttributeName: subscription_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    SubscriptionEventsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_SUBSCRIPTION_EVENTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: event_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: event_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-events-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: timestamp
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # ============================================================
    # Reflection Room V1 Tables
    # ============================================================

    # mc_reflection_sessions: per-user reflection session rows.
    # PK=session_id; GSI by user_id + created_at desc to find latest active.
    ReflectionSessionsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_REFLECTION_SESSIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: session_id
            AttributeType: S
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
        KeySchema:
          - AttributeName: session_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user_id-created_at-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # mc_echo_loop_state: active loop state per user (PK=user_id, SK=loop_id).
    EchoLoopStateTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_ECHO_LOOP_STATE_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: loop_id
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: loop_id
            KeyType: RANGE

    # mc_practice_completions: per-user completion log.
    # PK=user_id, SK=completion_id (sortable "<ts_iso>#<uuid>").
    # GSI by practice_id+completed_at for cooldown lookup.
    PracticeCompletionsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_PRACTICE_COMPLETIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: completion_id
            AttributeType: S
          - AttributeName: practice_id
            AttributeType: S
          - AttributeName: completed_at
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: completion_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: practice_id-completed_at-index
            KeySchema:
              - AttributeName: practice_id
                KeyType: HASH
              - AttributeName: completed_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # mc_user_personalization: per-user prefs/flags/recent_use/helpfulness.
    UserPersonalizationTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_USER_PERSONALIZATION_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH

    # mc_life_anchors: user-declared durable memory (MirrorGPT Memory Phase 2).
    # PK=user_id, SK=anchor_id. GSIs let us list by status / recency at scale;
    # the V1 repo filters in-app, but the indexes are defined for future use.
    LifeAnchorsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_LIFE_ANCHORS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: user_id
            AttributeType: S
          - AttributeName: anchor_id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
        KeySchema:
          - AttributeName: user_id
            KeyType: HASH
          - AttributeName: anchor_id
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: status
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: created-at-index
            KeySchema:
              - AttributeName: user_id
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    slim: false
    layer: false
    dockerizePip: true
    useDocker: true
    dockerPath: docker
    pythonBin: python3
    dockerImage: public.ecr.aws/sam/build-python3.11:latest
    pipCmdExtraArgs:
      - --no-cache-dir

package:
  patterns:
    - '!**/*'
    - 'src/**'
    - 'requirements.txt'
    # Compiled echo-share email templates rendered by email_service.py.
    # Sources (emails/src/*.mjml) and node_modules are intentionally excluded.
    - 'emails/dist/**'
