[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["app"]
skip_glob = ["*/migrations/*"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = false
warn_redundant_casts = true
warn_unused_configs = true
explicit_package_bases = true
disallow_untyped_defs = false

# Per-module configuration
[[tool.mypy.overrides]]
module = "src.app.services.cognito_service"
ignore_errors = true

[[tool.mypy.overrides]]
module = "performance_analysis"
ignore_errors = true

[[tool.mypy.overrides]]
module = "scripts.*"
ignore_errors = true

# Reflection Room V1: Pydantic v1-style confloat/conint runtime validators
# resolve correctly at runtime but trip mypy's valid-type check. Pydantic v2
# rewriting (Annotated[float, Field(...)]) is a follow-up — not blocking V1.
[[tool.mypy.overrides]]
module = "src.app.services.reflection.quiz_to_loop_seeding_loader"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.app.services.practice.catalog_loader"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.app.services.practice.rule_loader"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.app.services.practice.settings_loader"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.app.api.echo_v1_routes"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.app.api.practice_routes"
ignore_errors = true

# Test files: heavy use of dynamic **dict patterns mypy can't narrow.
# Matches the scripts.* precedent above.
[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "acceptance: Reflection Room V1 §17 acceptance checklist tests",
]

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/migrations/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips = ["B101"]  # Skip assert_used test
